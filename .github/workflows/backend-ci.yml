name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: map2drone
          POSTGRES_USER: map2drone
          POSTGRES_PASSWORD: map2drone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov ruff mypy

      - run: ruff check .
      - run: mypy app --ignore-missing-imports || true
      - run: pytest tests/ -v --cov=app
        env:
          DATABASE_URL: postgresql://map2drone:map2drone@localhost:5432/map2drone
